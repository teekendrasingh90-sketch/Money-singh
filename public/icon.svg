<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Google Fonts Import for identical visual rendering of Montserrat -->
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&amp;display=swap');
      
      .rupee-text {
        font-family: 'Montserrat', sans-serif;
        font-weight: 900;
        fill: url(#rupeeGrad);
      }
      
      .money-title {
        font-family: 'Montserrat', sans-serif;
        font-weight: 900;
        fill: #ffffff;
        letter-spacing: 10px;
        text-shadow: 0 4px 16px rgba(0, 0, 0, 0.25);
      }
      
      .tagline-text {
        font-family: 'Montserrat', sans-serif;
        font-weight: 700;
        letter-spacing: 6px;
        fill: rgba(255, 255, 255, 0.72);
      }
    </style>

    <!-- Main Card Body Gradient -->
    <linearGradient id="cardGrad" x1="15%" y1="0%" x2="85%" y2="100%">
      <stop offset="0%" stop-color="#FF8C00"/>
      <stop offset="100%" stop-color="#FFD700"/>
    </linearGradient>

    <!-- Rupee Text Fill Gradient -->
    <linearGradient id="rupeeGrad" x1="15%" y1="0%" x2="85%" y2="100%">
      <stop offset="0%" stop-color="#FF8C00"/>
      <stop offset="100%" stop-color="#FFD700"/>
    </linearGradient>

    <!-- Drop Shadow Filter for White Icon Box -->
    <filter id="boxShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#000000" flood-opacity="0.16"/>
    </filter>
  </defs>

  <!-- Background Base (Device App Icon Mask Ratio style) -->
  <rect width="512" height="512" rx="112" fill="url(#cardGrad)"/>

  <!-- Background Circles Decoration (Identical structure to HTML) -->
  <circle cx="460" cy="52" r="188" fill="#ffffff" opacity="0.09"/>
  <circle cx="52" cy="460" r="108" fill="#ffffff" opacity="0.09"/>
  <circle cx="418" cy="380" r="54" fill="#ffffff" opacity="0.06"/>

  <!-- Centered Inner White Box for Rupee Icon -->
  <rect x="182" y="75" width="148" height="148" rx="42" fill="#ffffff" filter="url(#boxShadow)"/>

  <!-- Rupee Symbol -->
  <text x="256" y="181" font-size="88" text-anchor="middle" class="rupee-text">₹</text>

  <!-- App Name MONEY Title (Balanced centering compensation) -->
  <text x="261" y="304" font-size="64" text-anchor="middle" class="money-title">MONEY</text>

  <!-- Minimal Transparent Divider -->
  <rect x="146" y="338" width="220" height="3" rx="1.5" fill="#ffffff" opacity="0.32" />

  <!-- Tagline Text -->
  <text x="259" y="378" font-size="14" text-anchor="middle" class="tagline-text">WATCH ADS · EARN CASH</text>
</svg>
