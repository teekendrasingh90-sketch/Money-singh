<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0f1d"/>
      <stop offset="100%" stop-color="#070a14"/>
    </linearGradient>
    <!-- Gold Gradient -->
    <linearGradient id="goldGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#d97706"/>
      <stop offset="50%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#fbbf24"/>
    </linearGradient>
    <!-- Glow Filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="15" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background Base -->
  <rect width="512" height="512" rx="128" fill="url(#bgGrad)"/>
  
  <!-- Outer Shiny Border -->
  <rect x="16" y="16" width="480" height="480" rx="112" fill="none" stroke="url(#goldGrad)" stroke-width="8" opacity="0.4"/>

  <!-- Centered Golden Coins Icon Group with Glow -->
  <g filter="url(#glow)">
    <!-- Back Coin -->
    <circle cx="216" cy="276" r="100" fill="url(#goldGrad)" stroke="#1e293b" stroke-width="4"/>
    <circle cx="216" cy="276" r="80" fill="none" stroke="#ffffff" stroke-width="6" opacity="0.3" stroke-dasharray="16 8"/>
    <text x="216" y="306" font-family="system-ui, sans-serif" font-size="90" font-weight="900" text-anchor="middle" fill="#0f172a">₹</text>

    <!-- Front Shining Coin -->
    <circle cx="296" cy="226" r="110" fill="url(#goldGrad)" stroke="#0f172a" stroke-width="6"/>
    <circle cx="296" cy="226" r="90" fill="none" stroke="#ffffff" stroke-width="8" opacity="0.4" stroke-dasharray="20 10"/>
    <text x="296" y="261" font-family="system-ui, sans-serif" font-size="110" font-weight="900" text-anchor="middle" fill="#0f172a">₹</text>
  </g>

  <!-- Sparkles on top-right -->
  <path d="M410,130 L416,145 L431,145 L418,155 L423,170 L410,160 L397,170 L402,155 L389,145 L404,145 Z" fill="#fbbf24"/>
  <path d="M120,380 L123,390 L133,390 L125,396 L128,406 L120,400 L112,406 L115,396 L107,390 L117,390 Z" fill="#fbbf24"/>
</svg>
