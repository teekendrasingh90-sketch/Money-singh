<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a2e1a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d1f0d;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="coinGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f5c842;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#e8a200;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c87800;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="innerCoinGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fdd86a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e09500;stop-opacity:1" />
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000000" flood-opacity="0.4"/>
    </filter>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background rounded square -->
  <rect width="400" height="400" rx="80" ry="80" fill="url(#bgGrad)"/>

  <!-- Subtle grid lines for texture -->
  <line x1="0" y1="133" x2="400" y2="133" stroke="#ffffff" stroke-opacity="0.03" stroke-width="1"/>
  <line x1="0" y1="266" x2="400" y2="266" stroke="#ffffff" stroke-opacity="0.03" stroke-width="1"/>
  <line x1="133" y1="0" x2="133" y2="400" stroke="#ffffff" stroke-opacity="0.03" stroke-width="1"/>
  <line x1="266" y1="0" x2="266" y2="400" stroke="#ffffff" stroke-opacity="0.03" stroke-width="1"/>

  <!-- Coin main circle -->
  <circle cx="200" cy="175" r="105" fill="url(#coinGrad)" filter="url(#softShadow)"/>

  <!-- Coin inner ring -->
  <circle cx="200" cy="175" r="91" fill="none" stroke="#fde06a" stroke-width="2.5" stroke-opacity="0.6"/>

  <!-- Coin face -->
  <circle cx="200" cy="175" r="85" fill="url(#innerCoinGrad)"/>

  <!-- Rupee symbol ₹ -->
  <text
    x="200"
    y="215"
    text-anchor="middle"
    font-family="Georgia, serif"
    font-size="92"
    font-weight="bold"
    fill="#7a4800"
    fill-opacity="0.25"
    filter="url(#glow)"
  >₹</text>
  <text
    x="200"
    y="213"
    text-anchor="middle"
    font-family="Georgia, serif"
    font-size="92"
    font-weight="bold"
    fill="#5a3200"
  >₹</text>

  <!-- Shine highlight on coin -->
  <ellipse cx="172" cy="142" rx="28" ry="16" fill="#ffffff" fill-opacity="0.18" transform="rotate(-30 172 142)"/>

  <!-- App name: Money -->
  <text
    x="200"
    y="322"
    text-anchor="middle"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="52"
    font-weight="bold"
    letter-spacing="6"
    fill="#f5c842"
  >Money</text>

  <!-- Tagline -->
  <text
    x="200"
    y="355"
    text-anchor="middle"
    font-family="Arial, sans-serif"
    font-size="15"
    letter-spacing="3"
    fill="#a0b890"
    font-weight="300"
  >SMART · SIMPLE · SAFE</text>
</svg>
