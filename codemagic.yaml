# Codemagic CI/CD Automation Workflow Configuration
# For more info see: https://docs.codemagic.io/yaml-basic-schema/yaml-getting-started/

workflows:
  android-capacitor-build:
    name: Android Capacitor APK Build
    max_build_duration: 60
    instance_type: linux # Linux instances compile Android projects much faster!
    
    environment:
      node: v20.12.0     # Pin Node.js to a version fully compatible with Next.js 15
      java: 17           # Java version required by Android Gradle Plugin (AGP) 8+
      groups:
        - android-signing # Optional: Connect your Keystore variables in Codemagic environment variables if needed
      vars:
        # Prevents Gradle from spinning up idle background processes on the CI machine to save RAM and build time
        GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.jvmargs=-Xmx2048m"
        PACKAGE_NAME: "com.admob.cashearn"

    triggering:
      events:
        - push
        - tag
      branch_patterns:
        - pattern: '*'
          include: true
          source: true

    cache:
      cache_paths:
        - ~/.npm
        - ~/.gradle/caches
        - ~/.gradle/wrapper
        - node_modules

    scripts:
      - name: Install Node.js Dependencies
        script: |
          # 1. Installs the critical frontend dependencies, Capacitor tools, and code-compilation modules
          npm ci --legacy-peer-deps || npm install --legacy-peer-deps
          
      - name: Build Next.js Static Export
        script: |
          # 2. Compiles the Next.js frontend pages and outputs clean, static HTML/JS assets to the ./www folder
          export NEXT_DEV=false
          npm run build

      - name: Sync Web Files with Capacitor Android Platform
        script: |
          # 3. Copies compiled static assets and web structure from the ./www folder into Android project assets
          npx cap sync android

      - name: Configure Android SDK Location
        script: |
          # 4. FIXES WORKFLOW ERROR: Correctly defines local.properties inside the 'android' folder
          # Gradle reads configuration inside 'android/local.properties', not root directory.
          echo "sdk.dir=$ANDROID_SDK_ROOT" > android/local.properties

      - name: Build Android App (APK)
        script: |
          cd android
          # 5. Fixes possible exec permission issues on gradlew inside CI system
          chmod +x gradlew
          
          # Compile debug APK (immediately installable on any Android device for direct testing)
          ./gradlew assembleDebug --no-daemon
          
          # Compile release APK (unsigned) which is ready to undergo signing or distribution
          ./gradlew assembleRelease --no-daemon

    artifacts:
      - android/app/build/outputs/apk/debug/app-debug.apk
      - android/app/build/outputs/apk/release/app-release-unsigned.apk

    publishing:
      email:
        recipients:
          - teekendrasingh00@gmail.com
          - jaatcj4@gmail.com
        notify:
          success: true   # Sends direct download link for debug/release APK as soon as compilation ends
          failure: true   # Notifies you if any compilation errors surface
